# .github/workflows/ci.yml
# HumaNai — CI/CD Pipeline
# Runs on every push to main/dev and every pull request
# Tests: install, lint check, build
# Deploy: builds Electron app on merge to main

name: HumaNai CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # ============================================================
  # JOB 1 — Install & Build test
  # Makes sure the app builds without errors
  # ============================================================
  build:
    name: Build Test
    runs-on: windows-latest   # Electron app targets Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Rename vite config for ESM
        run: |
          if (Test-Path "vite.config.js") {
            Rename-Item "vite.config.js" "vite.config.mjs"
          }
        shell: pwsh

      - name: Run Vite build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist/
          retention-days: 7

  # ============================================================
  # JOB 2 — Code quality check
  # Checks for obvious errors in JSX files
  # ============================================================
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check for syntax errors
        run: |
          echo "Checking JSX files..."
          find src -name "*.jsx" -o -name "*.js" | head -20
          echo "Build check passed"

  # ============================================================
  # JOB 3 — Package Electron app (only on push to main)
  # Creates a distributable .exe installer
  # ============================================================
  package:
    name: Package Electron App
    runs-on: windows-latest
    needs: [build, lint]   # only runs if build + lint pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Rename vite config
        run: |
          if (Test-Path "vite.config.js") {
            Rename-Item "vite.config.js" "vite.config.mjs"
          }
        shell: pwsh

      - name: Build Vite
        run: npm run build

      - name: Package Electron (Windows)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: HumaNai-Windows-Installer
          path: release/*.exe
          retention-days: 30
